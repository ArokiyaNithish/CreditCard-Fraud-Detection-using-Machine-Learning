<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Credit Card Fraud Detection</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            display: flex;
            justify-content: center;
            padding-top: 30px;
        }
        .container {
            background-color: #fff;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
            width: 500px;
        }
        h2 {
            text-align: center;
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-top: 10px;
        }
        input[type="number"] {
            width: 100%;
            padding: 7px;
            margin-top: 3px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        button {
            margin-top: 20px;
            width: 100%;
            padding: 10px;
            background-color: #1abc9c;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }
        .result {
            margin-top: 20px;
            padding: 10px;
            border-radius: 5px;
            text-align: center;
            font-weight: bold;
        }
        .fraud {
            background-color: #e74c3c;
            color: white;
        }
        .legit {
            background-color: #2ecc71;
            color: white;
        }
        .error {
            background-color: #f39c12;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>Credit Card Fraud Detection</h2>
        <form method="POST">
            <!-- Generate inputs for V1 to V28 -->
            {% for i in range(1,29) %}
            <label for="V{{i}}">V{{i}}:</label>
            <input type="number" step="any" name="V{{i}}" required>
            {% endfor %}
            
            <label for="Amount">Amount:</label>
            <input type="number" step="any" name="Amount" required>

            <button type="submit">Check Fraud</button>
        </form>

        {% if prediction %}
        <div class="result
            {% if 'Fraud' in prediction %} fraud
            {% elif 'Legitimate' in prediction %} legit
            {% else %} error
            {% endif %}
        ">
            {{ prediction }}
        </div>
        {% endif %}
    </div>
</body>
</html>
